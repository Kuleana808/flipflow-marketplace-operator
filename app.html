<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlipFlow MVP | Internal Prototype</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="description" content="FlipFlow internal MVP prototype. Not a public product experience." />
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;background:#020617;color:#e2e8f0;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
    .card{max-width:820px;background:#111827;border:1px solid #334155;border-radius:20px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    h1{margin:0 0 14px;font-size:38px;line-height:1.05}
    p{color:#cbd5e1;font-size:18px;line-height:1.65}
    .eyebrow{display:inline-block;margin-bottom:14px;padding:6px 10px;border-radius:999px;background:#1e293b;color:#a7f3d0;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
    .note{margin-top:20px;padding:14px 16px;border-radius:14px;background:#0b1220;color:#94a3b8;font-size:15px}
    a{color:#93c5fd}
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Internal MVP</span>
    <h1>This FlipFlow MVP has been pulled from public-facing use.</h1>
    <p>The previous HTML app was not at an acceptable quality bar. This route now exists only as an internal prototype placeholder until a real product surface is ready.</p>
    <div class="note">Questions or access requests should go to <a href="mailto:brent@operator.fyi">brent@operator.fyi</a>.</div>
  </main>
</body>
</html>
